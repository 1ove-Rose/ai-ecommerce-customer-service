services:
  postgres:
    image: postgres:16-alpine
    container_name: smartcs-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: smartcs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d smartcs"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartcs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: smartcs-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/smartcs
      REDIS_URL: redis://redis:6379/0
      FAISS_INDEX_PATH: /app/vector_store/faiss_index
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: http://localhost:3000
      OTEL_SERVICE_NAME: smart-cs-backend
      OPENAI_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
    ports:
      - "8000:8000"
    volumes:
      - vector_store:/app/vector_store

  frontend:
    build:
      context: ./frontend
    container_name: smartcs-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  vector_store: